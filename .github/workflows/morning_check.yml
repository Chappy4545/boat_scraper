name: Morning Update Health Check

on:
  schedule:
    # 毎日 08:30 JST (23:30 UTC 前日) と 11:30 JST (02:30 UTC) の2回警告
    - cron: '30 23 * * *'
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check today's bets exist
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          # JST 日付
          TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          echo "Checking bets_${TODAY}.json"
          if [ -f "docs/data/bets_${TODAY}.json" ]; then
            echo "OK: found"
          else
            echo "MISSING: bets_${TODAY}.json not found"
            python scripts/notify.py --kind morning_check --date "$TODAY"
          fi
