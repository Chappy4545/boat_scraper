database:
  url: "sqlite:///data/boatrace.db"
  echo: false

scraping:
  base_url: "https://www.boatrace.jp"
  delay_seconds: 2.0
  timeout: 30
  max_retries: 3
  cache_dir: "data/raw"
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

stadiums:
  "01": "桐生"
  "02": "戸田"
  "03": "江戸川"
  "04": "平和島"
  "05": "多摩川"
  "06": "浜名湖"
  "07": "蒲郡"
  "08": "常滑"
  "09": "津"
  "10": "三国"
  "11": "びわこ"
  "12": "住之江"
  "13": "尼崎"
  "14": "鳴門"
  "15": "丸亀"
  "16": "児島"
  "17": "宮島"
  "18": "徳山"
  "19": "下関"
  "20": "若松"
  "21": "芦屋"
  "22": "福岡"
  "23": "唐津"
  "24": "大村"

betting:
  min_expected_value: 1.2       # キャリブレーション後の真のEV（break-even=1.0、20%マージン）
  max_bets_per_race: 5
  min_model_confidence: 0.20
  min_odds: 1.5
  max_odds: 50.0
  bet_types:
    - "2連複"
    - "3連複"
    - "3連単"
  bet_type_overrides:
    nirenfuku:
      calibration_factor: 0.18  # 2026-06-14: 新モデル 67件1的中(1.5%) を受けて 0.37→0.18 へ慎重に調整
                                # (理論値は0.07だがサンプル小のため中間値を採用)
      # PL経由も現状は補正なし (7/5実測ROI=101%で概ね釣り合い、帯別も非単調)
      # サンプル増えたら calibration_table_pl 検討
    sanrenfuku:
      calibration_factor: 0.10  # 2026-06-14: 新モデル 8件0的中 を受けて 0.16→0.10 (8件は小さすぎてゼロ化はしない)
      min_ev: 1.5               # sanrenfukuは少し高めに設定
      min_odds: 25.0            # 高オッズ特化を維持
      max_model_prob: 0.05      # 2026-06-10: pred>5%帯はROI=0% (calibration不良) のため除外
    sanrentan:
      # 2026-07-05: 帯別実測補正テーブル (calibration_table) を導入
      # 5日累計429件から集計: raw_mp 20-30%帯 hit=2.74%, 30-50%帯 hit=4.96%, 50%+帯 hit=10.53%
      # 一律factorでは各帯で1.5-3倍の誤差 → 帯別補正
      calibration_table:
        - raw_mp_max: 0.30
          hit_rate: 0.028   # n=73, hits=2 (実測 2.74%)
        - raw_mp_max: 0.50
          hit_rate: 0.050   # n=242, hits=12 (実測 4.96%)
        - raw_mp_max: 1.00
          hit_rate: 0.105   # n=114, hits=12 (実測 10.53%)
      # 2026-07-06: PL out-of-sample (7/5, 123件) 実測から専用テーブル
      # sanrentanは10%以上帯で 0/31 と壊滅 → 5-10%帯のみ狙う
      calibration_table_pl:
        - raw_mp_max: 0.05
          hit_rate: 0.020   # n=2 (小サンプル、保守的)
        - raw_mp_max: 0.10
          hit_rate: 0.046   # n=87 hit=4.60% (実測)
        - raw_mp_max: 0.15
          hit_rate: 0.010   # n=20 hit=0% (壊滅、保守的)
        - raw_mp_max: 1.00
          hit_rate: 0.010   # 高帯は狙わない
      calibration_factor: 0.14  # fallback (calibration_tableが優先)
      max_odds: 25.0            # 大穴抑制を維持

money_management:
  initial_bankroll: 100000
  strategy: "quarter_kelly"   # fixed | proportional | quarter_kelly
  fixed_bet_amount: 200
  max_bet_per_race: 2000
  max_bet_per_day: 10000
  max_drawdown_stop: 0.30    # 30% ドローダウンで停止
  max_consecutive_losses_stop: 10

model:
  version: "v1"
  cv_folds: 5
  test_ratio: 0.20
  random_state: 42
  calibration: true
  # 2026-07-05: LambdaRank + Plackett-Luce の切替スイッチ
  # true: ranker のスコアから Plackett-Luce で joint probability を導出（calibration_factor不要）
  # false: 従来の独立win/top2/top3モデル + calibration_factor
  # 2026-07-06: バックテスト比較 (6/14-6/27) で 損益 -12,420→-120 の劇的改善 → true化
  use_ranker: true
  pl_temperature: 1.0   # softmax温度 (小さい=より鋭く、大きい=より均等)

api:
  host: "0.0.0.0"
  port: 8000
  debug: false

logging:
  level: "INFO"
  dir: "logs"
